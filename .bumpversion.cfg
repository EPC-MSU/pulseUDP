[bumpversion]
current_version = 1.0.0
commit = True
tag = True
tag_name = v{new_version}
message = Bump version: {current_version} -> {new_version}

# Package version lives in exactly two places; keep them in lockstep. The protocol
# version in spec/RFC-pulseUDP.md is a SEPARATE thing (wire major.minor) and is not
# touched here. Pushing the tag this creates triggers .github/workflows/release.yml.
[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:src/pulseudp/__init__.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
