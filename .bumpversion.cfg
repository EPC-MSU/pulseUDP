[bumpversion]
current_version = 1.0.0
commit = True
tag = True
tag_name = v{new_version}
message = Bump version: {current_version} -> {new_version}

# The package version lives in exactly one place (pyproject.toml reads it
# dynamically from here). The protocol version in spec/RFC-pulseUDP.md is a
# SEPARATE thing (wire major.minor) and is not touched here. Pushing the tag this
# creates triggers .github/workflows/release.yml.
[bumpversion:file:src/pulseudp/__init__.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
