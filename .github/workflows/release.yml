name: Release

# Build distributable artifacts on a version tag and attach them to a GitHub
# Release: a pure-Python wheel + sdist, and standalone one-folder builds for
# Windows (zip) and Linux (tar.gz).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:        # allow manual runs (artifacts only, no release)

permissions:
  contents: write           # needed to create the Release and upload assets

jobs:
  wheel:
    name: Wheel + sdist
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade build
      - run: python -m build         # -> dist/*.whl, dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: dist-python
          path: dist/*

  standalone:
    # One PyInstaller one-folder build per OS. The spec is platform-agnostic;
    # only the archive command differs. ubuntu-22.04 (not latest) keeps the
    # glibc baseline old enough for broad Linux compatibility.
    name: Standalone (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            archive: pulseUDP-windows-x64.zip
            archive_cmd: Compress-Archive -Path dist/pulseUDP -DestinationPath pulseUDP-windows-x64.zip
          - os: ubuntu-22.04
            archive: pulseUDP-linux-x64.tar.gz
            archive_cmd: tar -czf pulseUDP-linux-x64.tar.gz -C dist pulseUDP
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .[gui,package]
      - run: python -m PyInstaller packaging/pulseudp.spec --noconfirm
      - name: Archive the one-folder build      # default shell per OS: pwsh / bash
        run: ${{ matrix.archive_cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-standalone-${{ matrix.os }}
          path: ${{ matrix.archive }}

  release:
    name: Publish release
    needs: [wheel, standalone]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dist-python/*
            artifacts/dist-standalone-*/*
          generate_release_notes: true
