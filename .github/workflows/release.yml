name: Release

# Build distributable artifacts on a version tag and attach them to a GitHub
# Release: a pure-Python wheel + sdist, and standalone one-folder builds for
# Windows (zip) and Linux (tar.gz).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:        # allow manual runs (artifacts only, no release)

permissions:
  contents: write           # needed to create the Release and upload assets

jobs:
  wheel:
    name: Wheel + sdist
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"     # pure py3-none-any wheel; version-independent
      - run: python -m pip install --upgrade build
      - run: python -m build         # -> dist/*.whl, dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: dist-python
          path: dist/*

  windows-exe:
    name: Standalone Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"      # match the tested runtime floor
      - run: python -m pip install -e .[gui] pyinstaller
      - run: python -m PyInstaller packaging/pulseudp.spec --noconfirm
      - name: Zip the one-folder build
        shell: pwsh
        run: Compress-Archive -Path dist/pulseUDP -DestinationPath pulseUDP-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: pulseUDP-windows-x64.zip

  linux-exe:
    name: Standalone Linux build
    runs-on: ubuntu-22.04        # older base => broader glibc compatibility
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .[gui] pyinstaller
      - run: python -m PyInstaller packaging/pulseudp.spec --noconfirm
      - name: Tar the one-folder build
        run: tar -czf pulseUDP-linux-x64.tar.gz -C dist pulseUDP
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: pulseUDP-linux-x64.tar.gz

  release:
    name: Publish release
    needs: [wheel, windows-exe, linux-exe]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dist-python/*
            artifacts/dist-windows/*
            artifacts/dist-linux/*
          generate_release_notes: true
